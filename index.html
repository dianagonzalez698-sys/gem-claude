<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gem Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,700;1,6..96,400;1,6..96,600&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* From the board */
  --alabaster:#fcebd0;
  --terracotta:#7878DD;
  --terracotta-dark:#5a5eb8;
  --terracotta-light:#e8e8f8;
  --cornflower:#73762a;
  --cornflower-light:#f0f2d8;
  --sunshine:#FCEE8C;
  --golden:#FFD238;
  --grape:#3d3510;
  --bluebell:#A1A8BE;
  --grasslands:#5F5420;
  --lilac:#EDBEE4;

/* UI roles */
–bg:#fcebd0;
–surface:#fffbed;
–surface2:#fdf3e0;
–border:#e8d8a8;
–border2:#d4b87a;
–text:var(–grape);
–muted:#7878DD;
–subtle:#a8a060;
–shadow:0 2px 14px rgba(115,118,42,0.08);
–shadow-lg:0 10px 40px rgba(115,118,42,0.14);
–radius:18px;
–radius-sm:10px;
}

body{background:var(–bg);color:var(–text);font-family:‘Outfit’,sans-serif;font-weight:300;min-height:100vh}

/* ── HEADER ── */
header{background:var(–surface);border-bottom:1px solid var(–border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(–shadow)}
.logo{display:flex;align-items:center;gap:0.7rem}
.logo-gem{font-size:1.6rem;filter:drop-shadow(0 2px 6px rgba(120,120,221,0.4))}
.logo-text{font-family:‘Bodoni Moda’,serif;font-size:2.1rem;color:var(–terracotta);letter-spacing:0.01em;line-height:1;font-style:italic;font-weight:600}
.logo-sub{font-size:0.58rem;letter-spacing:0.32em;text-transform:uppercase;color:var(–muted);margin-top:1px;font-weight:500}
.header-right{display:flex;align-items:center;gap:0.75rem}
.count-pill{background:#fcee8c;color:#73762a;font-size:0.65rem;letter-spacing:0.1em;padding:0.3rem 0.8rem;border-radius:20px;font-weight:600}
.btn-primary{display:flex;align-items:center;gap:0.4rem;padding:0.58rem 1.2rem;background:#b1baca;color:#fdf8ee;border:none;border-radius:20px;font-family:‘Outfit’,sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.04em;cursor:pointer;transition:all 0.22s;box-shadow:0 3px 10px rgba(177,186,202,0.4)}
.btn-primary:hover{background:#8e9aab;transform:translateY(-1px);box-shadow:0 5px 18px rgba(177,186,202,0.5)}
.btn-ghost{display:flex;align-items:center;gap:0.3rem;padding:0.52rem 1rem;background:var(–surface);border:1.5px solid var(–border);border-radius:20px;color:var(–muted);font-family:‘Outfit’,sans-serif;font-size:0.68rem;font-weight:600;letter-spacing:0.04em;cursor:pointer;transition:all 0.22s}
.btn-ghost:hover{border-color:var(–terracotta);color:var(–terracotta);background:var(–terracotta-light)}

/* ── TABS ── */
.tab-nav{background:var(–surface);display:flex;padding:0 2rem;border-bottom:1px solid var(–border)}
.tab-btn{padding:0.85rem 1.4rem;background:transparent;border:none;border-bottom:2px solid transparent;color:var(–muted);font-family:‘Outfit’,sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-bottom:-1px}
.tab-btn:hover{color:var(–muted)}
.tab-btn.active{color:var(–terracotta);border-bottom-color:var(–terracotta)}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:0.75rem;padding:1.25rem 2rem;align-items:center}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap svg{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(–subtle);width:12px;height:12px;pointer-events:none}
.search-input{width:100%;padding:0.65rem 1rem 0.65rem 2.5rem;background:var(–surface);border:1.5px solid var(–border);border-radius:var(–radius-sm);color:var(–text);font-family:‘Outfit’,sans-serif;font-size:0.8rem;outline:none;transition:border-color 0.2s;box-shadow:var(–shadow)}
.search-input:focus{border-color:var(–terracotta)}
.search-input::placeholder{color:var(–subtle)}
.view-toggle{display:flex;gap:0.3rem;margin-left:auto}
.view-btn{padding:0.55rem 0.7rem;background:var(–surface);border:1.5px solid var(–border);border-radius:var(–radius-sm);color:var(–muted);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;box-shadow:var(–shadow)}
.view-btn.active,.view-btn:hover{border-color:var(–terracotta);color:var(–terracotta);background:var(–terracotta-light)}

/* ── PANELS ── */
.panel{display:none;background:var(–bg)}
.panel.active{display:block;background:var(–bg)}

/* ── MASONRY GRID ── */
.masonry-wrap{padding:1rem 2rem 4rem;columns:4 200px;gap:1rem}
@media(max-width:900px){.masonry-wrap{columns:3 170px}}
@media(max-width:580px){.masonry-wrap{columns:2 140px;padding:0.75rem 1rem 3rem}}

.gem-card{break-inside:avoid;background:var(–surface);border-radius:var(–radius);overflow:hidden;cursor:pointer;transition:all 0.25s;margin-bottom:1rem;box-shadow:var(–shadow);border:1px solid var(–border)}
.gem-card:hover{transform:translateY(-5px);box-shadow:var(–shadow-lg);border-color:var(–terracotta)}

.gem-image{width:100%;display:block;object-fit:cover}
.gem-image.tall{aspect-ratio:3/4}
.gem-ph{width:100%;aspect-ratio:3/4;background:linear-gradient(145deg,#fdf3e0 0%,#f0f2d8 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem}
.gem-ph-icon{font-size:2.8rem;filter:drop-shadow(0 2px 8px rgba(120,120,221,0.3))}
.gem-ph-label{font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(–muted);font-weight:500}
.gem-card-body{padding:0.85rem 1rem 1rem}
.gem-card-name{font-family:‘Bodoni Moda’,serif;font-size:1rem;color:var(–text);margin-bottom:0.3rem;line-height:1.3}
.gem-card-dim{font-size:0.62rem;letter-spacing:0.1em;color:var(–muted);text-transform:uppercase;font-weight:500}
.gem-card-dim b{color:var(–terracotta)}
.gem-slot-tag{display:inline-flex;align-items:center;gap:0.25rem;margin-top:0.45rem;font-size:0.6rem;letter-spacing:0.08em;padding:0.22rem 0.6rem;border-radius:20px;background:#fcee8c;color:#73762a;font-weight:600}

/* List view */
.list-wrap{display:flex;flex-direction:column;gap:0.6rem;padding:0 2rem 4rem}
@media(max-width:580px){.list-wrap{padding:0 1rem 3rem}}
.gem-card.list-card{display:flex;align-items:center;border-radius:var(–radius-sm);margin-bottom:0}
.gem-card.list-card .gem-ph,.gem-card.list-card .gem-image{width:70px;min-width:70px;aspect-ratio:1;border-radius:var(–radius-sm) 0 0 var(–radius-sm)}
.gem-card.list-card .gem-ph{aspect-ratio:1}
.gem-card.list-card .gem-card-body{display:flex;align-items:center;gap:1.5rem;flex:1;padding:0.65rem 1rem}
.gem-card.list-card .gem-card-name{margin-bottom:0;font-size:0.92rem;min-width:110px}

.empty-state{text-align:center;padding:5rem 2rem;color:var(–muted);background:var(–bg)}
.empty-icon{font-size:3.5rem;display:block;margin-bottom:1rem;filter:drop-shadow(0 2px 12px rgba(234,120,91,0.3))}
.empty-state h2{font-family:‘Bodoni Moda’,serif;font-size:1.6rem;color:var(–text);margin-bottom:0.4rem}
.empty-state p{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:1.5rem}

/* ── CASE MAP ── */
.case-wrap{padding:1.5rem 2rem 4rem}
@media(max-width:580px){.case-wrap{padding:1rem 1rem 3rem}}
.case-stats{display:flex;gap:0.75rem;margin-bottom:1.75rem;flex-wrap:wrap}
.case-stat{padding:1rem 1.4rem;background:var(–surface);border:1px solid var(–border);border-radius:var(–radius-sm);min-width:95px;box-shadow:var(–shadow)}
.case-stat-label{font-size:0.54rem;letter-spacing:0.24em;text-transform:uppercase;color:var(–muted);margin-bottom:0.28rem;font-weight:500}
.case-stat-value{font-family:‘Bodoni Moda’,serif;font-size:1.6rem;color:var(–text)}
.case-stat-value.dim{color:var(–subtle)}
.case-legend{display:flex;gap:1.25rem;margin-bottom:1.25rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:0.4rem;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(–muted);font-weight:500}
.legend-swatch{width:13px;height:13px;border-radius:3px}
.sw-filled{background:var(–terracotta-light);border:1.5px solid var(–terracotta)}
.sw-empty{background:var(–surface2);border:1.5px solid var(–border)}
.sw-sel{background:var(–cornflower-light);border:1.5px solid var(–cornflower)}
.case-scroll{overflow-x:auto;padding-bottom:1rem}
.case-grid-wrap{display:inline-block;background:var(–surface);border:1px solid var(–border);border-radius:var(–radius);padding:1.25rem 1.5rem;min-width:max-content;box-shadow:var(–shadow)}
.case-col-headers{display:flex;margin-left:2.2rem;margin-bottom:0.4rem}
.col-header{width:56px;text-align:center;font-size:0.52rem;letter-spacing:0.16em;color:var(–subtle);text-transform:uppercase;font-weight:600}
.case-row{display:flex;align-items:center;margin-bottom:4px}
.row-label{width:2.2rem;font-size:0.56rem;letter-spacing:0.16em;color:var(–muted);text-align:center;font-weight:700}
.case-slot{width:56px;height:56px;margin:2px;background:var(–surface2);border:1.5px solid var(–border);border-radius:10px;cursor:pointer;transition:all 0.18s;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.case-slot:hover{border-color:var(–cornflower);background:var(–cornflower-light);transform:scale(1.07)}
.case-slot.filled{background:var(–terracotta-light);border-color:var(–terracotta)}
.case-slot.filled:hover{background:#d4d4f5;border-color:var(–terracotta-dark)}
.case-slot.selected{border-color:#7878DD !important;background:#e8e8f8 !important;box-shadow:0 0 0 2px rgba(120,120,221,0.3)}
.slot-emoji{width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.slot-img{width:100%;height:100%;object-fit:cover;display:block}
.slot-name{font-size:0.4rem;letter-spacing:0.08em;color:var(–muted);text-transform:uppercase;margin-top:2px;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;padding:0 2px;font-weight:500}
.slot-id{position:absolute;top:2px;right:3px;font-size:0.38rem;color:var(–subtle);letter-spacing:0.06em;font-weight:600}

/* Tooltip */
.slot-tooltip{display:none;position:fixed;z-index:300;background:var(–surface);border:1px solid var(–border);border-radius:var(–radius-sm);padding:0.6rem 0.85rem;min-width:120px;max-width:180px;box-shadow:var(–shadow-lg);pointer-events:none}
.slot-tooltip.show{display:block}
.tt-name{font-family:‘Bodoni Moda’,serif;font-size:0.95rem;color:var(–text);margin-bottom:0.1rem}
.tt-dim{font-size:0.6rem;letter-spacing:0.1em;color:var(–muted)}
.tt-empty{font-size:0.62rem;letter-spacing:0.14em;color:var(–subtle)}

.map-action{margin-top:1.25rem;padding:1rem 1.25rem;background:var(–surface);border:1px solid var(–border);border-radius:var(–radius);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;box-shadow:var(–shadow)}
.map-action-info{flex:1}
.map-action-slot{font-size:0.56rem;letter-spacing:0.22em;text-transform:uppercase;color:var(–muted);margin-bottom:0.2rem;font-weight:600}
.map-action-name{font-family:‘Bodoni Moda’,serif;font-size:1.1rem;color:var(–text)}
.map-action-btns{display:flex;gap:0.5rem;flex-wrap:wrap}

/* Shared small buttons */
.btn-sm{padding:0.4rem 0.9rem;background:var(–surface);border:1.5px solid var(–border);border-radius:20px;color:var(–muted);font-family:‘Outfit’,sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;cursor:pointer;transition:all 0.18s}
.btn-sm:hover{border-color:var(–terracotta);color:var(–terracotta);background:var(–terracotta-light)}
.btn-sm.primary{border-color:var(–terracotta);color:var(–terracotta);background:var(–terracotta-light)}
.btn-sm.primary:hover{background:var(–terracotta);color:#fdf8ee}
.btn-sm.danger:hover{border-color:#c46060;color:#c46060}

/* ── MODALS ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(115,118,42,0.35);backdrop-filter:blur(10px);z-index:200;align-items:center;justify-content:center;padding:1.5rem}
.modal-backdrop.open{display:flex}
.modal{background:var(–surface);border-radius:var(–radius);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:modalIn 0.22s ease;box-shadow:var(–shadow-lg);border:1px solid var(–border)}
.modal.wide{max-width:580px}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.4rem 1.75rem;border-bottom:1px solid var(–border)}
.modal-title{font-family:‘Bodoni Moda’,serif;font-size:1.25rem;color:var(–text)}
.modal-close{background:none;border:none;color:var(–muted);cursor:pointer;font-size:1.2rem;line-height:1;transition:all 0.2s;padding:0.25rem 0.4rem;border-radius:6px}
.modal-close:hover{background:var(–surface2);color:var(–text)}
.modal-body{padding:1.5rem 1.75rem}
.modal-footer{display:flex;gap:0.6rem;justify-content:flex-end;padding:1rem 1.75rem;border-top:1px solid var(–border);background:var(–surface2);border-radius:0 0 var(–radius) var(–radius)}

/* Form elements */
.upload-zone{border:2px dashed var(–border2);background:linear-gradient(145deg,var(–terracotta-light),var(–surface2));border-radius:var(–radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem;padding:1.75rem;cursor:pointer;transition:all 0.2s;margin-bottom:1.2rem;position:relative;min-height:140px}
.upload-zone:hover{border-color:var(–terracotta);background:linear-gradient(145deg,#d4d4f5,var(–terracotta-light))}
.upload-zone.has-image{padding:0;border-style:solid;border-color:var(–border);min-height:unset;background:none}
.upload-zone img{width:100%;max-height:200px;object-fit:cover;display:block;border-radius:calc(var(–radius) - 2px)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:1.8rem}
.upload-hint{font-size:0.64rem;letter-spacing:0.16em;text-transform:uppercase;color:var(–muted);font-weight:500}

.field{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:0.85rem}
.field.no-mb{margin-bottom:0}
.field-group{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-bottom:0.85rem}
label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(–muted);font-weight:600}
input[type=text],input[type=number],textarea,select{background:var(–surface2);border:1.5px solid var(–border);border-radius:var(–radius-sm);color:var(–text);font-family:‘Outfit’,sans-serif;font-size:0.82rem;font-weight:400;padding:0.62rem 0.85rem;outline:none;transition:border-color 0.2s;width:100%;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(–terracotta);background:var(–surface)}
textarea{resize:vertical;min-height:72px}
select option{background:var(–surface)}

.btn-cancel{padding:0.58rem 1.3rem;background:transparent;border:1.5px solid var(–border);border-radius:20px;color:var(–muted);font-family:‘Outfit’,sans-serif;font-size:0.7rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-cancel:hover{border-color:var(–border2);color:var(–text)}
.btn-save{padding:0.58rem 1.6rem;background:var(–terracotta);border:none;border-radius:20px;color:#fdf8ee;font-family:‘Outfit’,sans-serif;font-size:0.7rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(120,120,221,0.35)}
.btn-save:hover{background:var(–terracotta-dark);box-shadow:0 4px 16px rgba(120,120,221,0.4)}

/* Source section */
.source-section{border:1.5px solid var(–border);border-radius:var(–radius-sm);background:var(–surface2);margin-bottom:0.85rem;overflow:hidden}
.source-tabs{display:flex;border-bottom:1px solid var(–border);background:var(–surface)}
.src-tab{flex:1;padding:0.6rem;background:transparent;border:none;color:var(–muted);font-family:‘Outfit’,sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.src-tab.active{color:var(–terracotta);border-bottom-color:var(–terracotta)}
.src-pane{display:none;padding:0.85rem}
.src-pane.active{display:block}
.src-preview{width:100%;max-height:150px;object-fit:cover;display:block;margin-top:0.6rem;border-radius:var(–radius-sm);border:1px solid var(–border)}
.src-url-row{display:flex;gap:0.5rem;align-items:flex-start}
.src-url-row input{flex:1}
.btn-load{padding:0.62rem 0.9rem;background:var(–surface);border:1.5px solid var(–border);border-radius:var(–radius-sm);color:var(–muted);font-family:‘Outfit’,sans-serif;font-size:0.62rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.btn-load:hover{border-color:var(–terracotta);color:var(–terracotta)}

/* Detail modal */
.detail-hero{width:100%;max-height:280px;object-fit:cover;display:block;border-radius:var(–radius) var(–radius) 0 0}
.detail-hero-ph{width:100%;height:180px;background:linear-gradient(145deg,#fdf3e0 0%,#f0f2d8 100%);display:flex;align-items:center;justify-content:center;border-radius:var(–radius) var(–radius) 0 0}
.detail-body{padding:1.5rem 1.75rem}
.detail-name{font-family:‘Bodoni Moda’,serif;font-size:1.7rem;color:var(–text);margin-bottom:0.3rem;line-height:1.2}
.detail-slot-tag{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.62rem;letter-spacing:0.1em;padding:0.25rem 0.7rem;border-radius:20px;background:#fcee8c;color:#73762a;font-weight:700;margin-bottom:0.75rem}
.detail-divider{height:1px;background:var(–border);margin:0.75rem 0}
.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin:1rem 0;padding:1.1rem;background:var(–surface2);border-radius:var(–radius-sm);border:1px solid var(–border)}
.ds-label{font-size:0.56rem;letter-spacing:0.2em;text-transform:uppercase;color:var(–muted);margin-bottom:0.25rem;font-weight:600}
.ds-value{font-family:‘Bodoni Moda’,serif;font-size:1.05rem;color:var(–text)}
.detail-notes{font-size:0.8rem;line-height:1.75;color:var(–muted);font-weight:400}
.detail-source{margin-top:1rem;padding:1rem;background:var(–surface2);border-radius:var(–radius-sm);border:1px solid var(–border)}
.detail-source-label{font-size:0.56rem;letter-spacing:0.22em;text-transform:uppercase;color:var(–muted);margin-bottom:0.6rem;font-weight:600}
.detail-source-img{width:100%;max-height:180px;object-fit:cover;display:block;margin-bottom:0.75rem;border-radius:var(–radius-sm);border:1px solid var(–border)}
.detail-source-link{display:inline-flex;align-items:center;gap:0.5rem;font-size:0.7rem;font-weight:600;color:var(–terracotta);text-decoration:none;border:1.5px solid var(–terracotta-light);border-radius:20px;padding:0.42rem 0.9rem;transition:all 0.2s;background:var(–terracotta-light)}
.detail-source-link:hover{background:var(–terracotta);color:#fdf8ee;border-color:var(–terracotta)}
.detail-actions{display:flex;gap:0.6rem;padding:1rem 1.75rem;border-top:1px solid var(–border);background:var(–surface2);border-radius:0 0 var(–radius) var(–radius);align-items:center;flex-wrap:wrap}
.btn-edit{padding:0.52rem 1.2rem;background:var(–terracotta-light);border:none;border-radius:20px;color:var(–terracotta-dark);font-family:‘Outfit’,sans-serif;font-size:0.68rem;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-edit:hover{background:var(–terracotta);color:#fdf8ee}
.btn-dupe{padding:0.52rem 1.2rem;background:#fcee8c;border:none;border-radius:20px;color:#73762a;font-family:‘Outfit’,sans-serif;font-size:0.68rem;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-dupe:hover{background:#73762a;color:#fdf8ee}
.btn-delete{padding:0.52rem 1.2rem;background:transparent;border:1.5px solid #e8b8a8;border-radius:20px;color:#c46060;font-family:‘Outfit’,sans-serif;font-size:0.68rem;font-weight:600;cursor:pointer;transition:all 0.2s;margin-left:auto}
.btn-delete:hover{background:#fdf0e8;border-color:#c46060;color:#c46060}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(–bg)}
::-webkit-scrollbar-thumb{background:var(–border2);border-radius:4px}
@media(max-width:640px){
header,.tab-nav,.toolbar{padding-left:1rem;padding-right:1rem}
.field-group{grid-template-columns:1fr 1fr}
.logo-text{font-size:1.6rem}
}
</style>

</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-gem" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="14,2 22,8 25,16 14,26 3,16 6,8" fill="none" stroke="#7878DD" stroke-width="1.8" stroke-linejoin="round"/><polygon points="14,6 20,10 22,16 14,22 6,16 8,10" fill="none" stroke="#7878DD" stroke-width="1" stroke-linejoin="round" opacity="0.5"/><line x1="8" y1="10" x2="20" y2="10" stroke="#7878DD" stroke-width="1" opacity="0.4"/></svg>
    <div>
      <div class="logo-text">Gem Vault</div>
      <div class="logo-sub">Collection Catalog</div>
    </div>
  </div>
  <div class="header-right">
    <div class="count-pill"><span id="gemCount">0</span> stones</div>
    <button class="btn-ghost" onclick="importData()"> Import</button>
    <button class="btn-ghost" onclick="exportData()"> Export</button>
    <button class="btn-primary" onclick="openAddModal()">+ Add Stone</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(this)">
  </div>
</header>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('collection',this)">Collection</button>
  <button class="tab-btn" onclick="switchTab('case',this)">Case Map</button>
</div>

<!-- COLLECTION -->

<div class="panel active" id="panel-collection">
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" type="text" placeholder="Search stones…" oninput="filterGems(this.value)">
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="gridBtn" onclick="setView('grid')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="9" height="9" rx="1"/><rect x="13" y="2" width="9" height="9" rx="1"/><rect x="2" y="13" width="9" height="9" rx="1"/><rect x="13" y="13" width="9" height="9" rx="1"/></svg>
      </button>
      <button class="view-btn" id="listBtn" onclick="setView('list')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="3" width="20" height="4" rx="1"/><rect x="2" y="10" width="20" height="4" rx="1"/><rect x="2" y="17" width="20" height="4" rx="1"/></svg>
      </button>
    </div>
  </div>
  <div id="collectionContainer"></div>
</div>

<!-- CASE MAP -->

<div class="panel" id="panel-case">
  <div class="case-wrap">
    <div class="case-stats">
      <div class="case-stat"><div class="case-stat-label">Total</div><div class="case-stat-value" id="statTotal">50</div></div>
      <div class="case-stat"><div class="case-stat-label">Filled</div><div class="case-stat-value" id="statFilled">0</div></div>
      <div class="case-stat"><div class="case-stat-label">Empty</div><div class="case-stat-value dim" id="statEmpty">50</div></div>
      <div class="case-stat"><div class="case-stat-label">Occupancy</div><div class="case-stat-value" id="statPct">0%</div></div>
    </div>
    <div class="case-legend">
      <div class="legend-item"><span class="legend-swatch sw-filled"></span>Filled</div>
      <div class="legend-item"><span class="legend-swatch sw-empty"></span>Empty</div>
      <div class="legend-item"><span class="legend-swatch sw-sel"></span>Selected</div>
    </div>
    <div class="case-scroll">
      <div class="case-grid-wrap">
        <div class="case-col-headers" id="colHeaders"></div>
        <div id="caseGrid"></div>
      </div>
    </div>
    <div class="map-action" id="mapAction" style="display:none">
      <div class="map-action-info">
        <div class="map-action-slot">Slot <span id="selSlotId"></span></div>
        <div class="map-action-name" id="selSlotName">Empty</div>
      </div>
      <div class="map-action-btns" id="mapActionBtns"></div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->

<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add New Stone</div>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="upload-zone" id="uploadZone">
        <input type="file" accept="image/*" id="imageInput" onchange="handleImageUpload(this)">
        <div id="uploadContent">
          <div class="upload-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a8a060" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3.5"/><circle cx="17" cy="8" r="1"/></svg></div>
          <div class="upload-hint">Click to upload photo</div>
        </div>
      </div>
      <div class="field"><label>Stone Name *</label><input type="text" id="stoneName" placeholder="e.g. Blue Sapphire, Alexandrite…"></div>
      <div class="field-group">
        <div class="field no-mb"><label>Length (mm)</label><input type="number" id="dimL" placeholder="0.0" step="0.1" min="0"></div>
        <div class="field no-mb"><label>Width (mm)</label><input type="number" id="dimW" placeholder="0.0" step="0.1" min="0"></div>
        <div class="field no-mb"><label>Depth (mm)</label><input type="number" id="dimD" placeholder="0.0" step="0.1" min="0"></div>
      </div>
      <div class="field" style="margin-top:0.85rem"><label>Case Slot</label><select id="slotSelect"></select></div>
      <div class="field"><label>Notes (optional)</label><textarea id="stoneNotes" placeholder="Color, clarity, cut, origin…"></textarea></div>
      <label style="display:block;margin-bottom:0.5rem;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);font-weight:600">Source / Listing</label>
      <div class="source-section">
        <div class="source-tabs">
          <button class="src-tab active" onclick="srcTab('link',this)"> Listing URL</button>
          <button class="src-tab" onclick="srcTab('img',this)"> Reference Photo</button>
        </div>
        <div class="src-pane active" id="srcPaneLink">
          <div class="field no-mb"><input type="text" id="sourceUrl" placeholder="https://gemselect.com/…"></div>
        </div>
        <div class="src-pane" id="srcPaneImg">
          <div class="src-url-row">
            <input type="text" id="sourceImgUrl" placeholder="Paste image URL from seller's site…">
            <button class="btn-load" onclick="previewSrcImg()">Preview</button>
          </div>
          <div id="srcImgFeedback"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save" onclick="saveGem()">Save Stone</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->

<div class="modal-backdrop" id="detailModal">
  <div class="modal wide">
    <div id="detailContent"></div>
    <div class="detail-actions">
      <button class="btn-edit" onclick="editCurrent()">Edit</button>
      <button class="btn-dupe" onclick="duplicateCurrent()">Duplicate</button>
      <button class="btn-delete" onclick="deleteCurrent()">Delete</button>
    </div>
  </div>
</div>

<div class="slot-tooltip" id="slotTooltip"></div>

<script>
const ROWS=5,COLS=10,ROW_LABELS=['A','B','C','D','E'];


let gems=JSON.parse(localStorage.getItem('gemVault')||'[]');
let currentView='grid',editingId=null,currentDetailId=null;
let pendingImage=null,searchQuery='',selectedSlot=null,prefillSlot=null;

function save(){localStorage.setItem('gemVault',JSON.stringify(gems));}
function sid(r,c){return ROW_LABELS[r]+(c+1);}
function gemAt(s){return gems.find(g=>g.slot===s)||null;}

function getEmoji(name=''){
  // Returns a small inline SVG gem icon with a color hint — no emojis
  const n=name.toLowerCase();
  let color='#7878DD';
  if(n.includes('ruby')||n.includes('garnet')||n.includes('spinel')) color='#c46060';
  else if(n.includes('emerald')||n.includes('jade')||n.includes('peridot')) color='#73762a';
  else if(n.includes('sapphire')||n.includes('aquamarine')) color='#5b8fcc';
  else if(n.includes('amethyst')||n.includes('tanzanite')) color='#9b7ec8';
  else if(n.includes('topaz')||n.includes('amber')||n.includes('citrine')) color='#c8a23a';
  else if(n.includes('opal')) color='#7878DD';
  else if(n.includes('diamond')) color='#7878DD';
  return `<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="24,4 36,14 40,28 24,44 8,28 12,14" fill="${color}" opacity="0.18" stroke="${color}" stroke-width="2" stroke-linejoin="round"/><polygon points="24,10 32,17 35,28 24,38 13,28 16,17" fill="none" stroke="${color}" stroke-width="1.2" stroke-linejoin="round" opacity="0.5"/><line x1="13" y1="17" x2="35" y2="17" stroke="${color}" stroke-width="1" opacity="0.4"/></svg>`;
}

function switchTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='case')renderCase();
}

function render(){
  const container=document.getElementById('collectionContainer');
  const q=searchQuery.toLowerCase();
  const list=gems.filter(g=>!q||g.name.toLowerCase().includes(q));
  document.getElementById('gemCount').textContent=gems.length;
  if(!list.length){
    container.innerHTML=`<div class="empty-state">
      <span class="empty-icon"><svg width="52" height="52" viewBox="0 0 48 48" fill="none" stroke="#7878DD" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${gems.length?'<circle cx="20" cy="20" r="13"/><line x1="29" y1="29" x2="42" y2="42"/>':'<polygon points="24,4 36,14 40,28 24,44 8,28 12,14"/><line x1="12" y1="17" x2="36" y2="17"/>'}</svg></span>
      <h2>${gems.length?'No stones found':'<span style="color:#66974a">Your vault awaits</span>'}</h2>
      <p>${gems.length?'Try a different search':'Begin cataloging your collection'}</p>
      ${!gems.length?'<button class="btn-primary" onclick="openAddModal()">+ Add First Stone</button>':''}
    </div>`;
    return;
  }
  if(currentView==='grid'){
    container.innerHTML='<div class="masonry-wrap">'+list.map(cardHtml).join('')+'</div>';
  } else {
    container.innerHTML='<div class="list-wrap">'+list.map(listCardHtml).join('')+'</div>';
  }
}

function cardHtml(g){
  const dims=[g.length,g.width,g.depth].filter(Boolean);
  const imgEl=g.image
    ?`<img class="gem-image tall" src="${g.image}" alt="${g.name}" loading="lazy">`
    :`<div class="gem-ph"><span class="gem-ph-icon">${getEmoji(g.name)}</span><span class="gem-ph-label">No Photo</span></div>`;
  return `<div class="gem-card" onclick="openDetail('${g.id}')">
    ${imgEl}
    <div class="gem-card-body">
      <div class="gem-card-name">${g.name||'Unnamed Stone'}</div>
      ${dims.length?`<div class="gem-card-dim"><b>◈</b> ${dims.join(' × ')} mm</div>`:''}
      ${g.slot?`<div class="gem-slot-tag">Slot ${g.slot}</div>`:''}
    </div>
  </div>`;
}

function listCardHtml(g){
  const dims=[g.length,g.width,g.depth].filter(Boolean);
  const imgEl=g.image
    ?`<img class="gem-image" src="${g.image}" alt="${g.name}" loading="lazy">`
    :`<div class="gem-ph"><span class="gem-ph-icon">${getEmoji(g.name)}</span></div>`;
  return `<div class="gem-card list-card" onclick="openDetail('${g.id}')">
    ${imgEl}
    <div class="gem-card-body">
      <div class="gem-card-name">${g.name||'Unnamed Stone'}</div>
      ${dims.length?`<div class="gem-card-dim"><b>◈</b> ${dims.join(' × ')} mm</div>`:''}
      ${g.slot?`<div class="gem-slot-tag">Slot ${g.slot}</div>`:''}
    </div>
  </div>`;
}

function setView(v){
  currentView=v;
  document.getElementById('gridBtn').classList.toggle('active',v==='grid');
  document.getElementById('listBtn').classList.toggle('active',v==='list');
  render();
}
function filterGems(q){searchQuery=q;render();}

function renderCase(){
  const filled=gems.filter(g=>g.slot).length,total=ROWS*COLS;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statFilled').textContent=filled;
  document.getElementById('statEmpty').textContent=total-filled;
  document.getElementById('statPct').textContent=Math.round(filled/total*100)+'%';
  document.getElementById('colHeaders').innerHTML=Array.from({length:COLS},(_,c)=>`<div class="col-header">${c+1}</div>`).join('');
  const grid=document.getElementById('caseGrid');
  grid.innerHTML='';
  for(let r=0;r<ROWS;r++){
    const row=document.createElement('div');
    row.className='case-row';
    row.innerHTML=`<div class="row-label">${ROW_LABELS[r]}</div>`;
    for(let c=0;c<COLS;c++){
      const s=sid(r,c),gem=gemAt(s);
      const el=document.createElement('div');
      el.className='case-slot'+(gem?' filled':'')+(selectedSlot===s?' selected':'');
      if(gem){
        el.innerHTML=gem.image
          ?`<img class="slot-img" src="${gem.image}" alt="${gem.name}"><div class="slot-id">${s}</div>`
          :`<span class="slot-emoji">${getEmoji(gem.name)}</span><div class="slot-name">${gem.name}</div><div class="slot-id">${s}</div>`;
      } else {
        el.innerHTML=`<div class="slot-id">${s}</div>`;
      }
      el.addEventListener('click',()=>selectSlot(s));
      el.addEventListener('mouseenter',e=>showTip(e,s,gem));
      el.addEventListener('mouseleave',hideTip);
      row.appendChild(el);
    }
    grid.appendChild(row);
  }
}

function selectSlot(s){selectedSlot=selectedSlot===s?null:s;renderCase();updateActionBar();}

function updateActionBar(){
  const bar=document.getElementById('mapAction');
  if(!selectedSlot){bar.style.display='none';return;}
  bar.style.display='flex';
  const gem=gemAt(selectedSlot);
  document.getElementById('selSlotId').textContent=selectedSlot;
  document.getElementById('selSlotName').textContent=gem?gem.name:'Empty slot';
  const btns=document.getElementById('mapActionBtns');
  if(gem){
    btns.innerHTML=`
      <button class="btn-sm primary" onclick="openDetail('${gem.id}')">View Stone</button>
      <button class="btn-sm" onclick="openAddModal('${gem.id}')">Edit</button>
      <button class="btn-sm danger" onclick="clearSlot('${gem.id}')">Clear Slot</button>`;
  } else {
    btns.innerHTML=`<button class="btn-sm primary" onclick="assignToSlot('${selectedSlot}')">+ Assign Stone</button>`;
  }
}

function clearSlot(id){const g=gems.find(g=>g.id===id);if(g){g.slot='';save();render();renderCase();updateActionBar();}}
function assignToSlot(s){prefillSlot=s;openAddModal();}

function showTip(e,s,gem){
  const tt=document.getElementById('slotTooltip');
  if(gem){
    const dims=[gem.length,gem.width,gem.depth].filter(Boolean);
    tt.innerHTML=`<div class="tt-name">${gem.name}</div>${dims.length?`<div class="tt-dim">${dims.join(' × ')} mm</div>`:''}`;
  } else {
    tt.innerHTML=`<div class="tt-empty">${s} — Empty</div>`;
  }
  tt.classList.add('show');
  tt.style.left=Math.min(e.clientX+14,window.innerWidth-190)+'px';
  tt.style.top=Math.min(e.clientY-8,window.innerHeight-70)+'px';
}
function hideTip(){document.getElementById('slotTooltip').classList.remove('show');}

function populateSlots(current){
  const used=new Set(gems.filter(g=>g.id!==editingId&&g.slot).map(g=>g.slot));
  const sel=document.getElementById('slotSelect');
  sel.innerHTML='<option value="">— Unassigned —</option>';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const s=sid(r,c);
    if(!used.has(s)||s===current){
      const o=document.createElement('option');
      o.value=s;o.textContent=s;
      if(s===current)o.selected=true;
      sel.appendChild(o);
    }
  }
}

function fillForm(g,slot){
  document.getElementById('stoneName').value=g.name||'';
  document.getElementById('dimL').value=g.length||'';
  document.getElementById('dimW').value=g.width||'';
  document.getElementById('dimD').value=g.depth||'';
  document.getElementById('stoneNotes').value=g.notes||'';
  document.getElementById('sourceUrl').value=g.sourceUrl||'';
  document.getElementById('sourceImgUrl').value=g.sourceImgUrl||'';
  document.getElementById('srcImgFeedback').innerHTML=g.sourceImgUrl?`<img class="src-preview" src="${g.sourceImgUrl}" alt="preview">`:'';
  pendingImage=g.image||null;
  if(g.image)showPreview(g.image); else resetUpload();
  populateSlots(slot||'');
  if(slot)document.getElementById('slotSelect').value=slot;
}

function openAddModal(id=null){
  editingId=id;pendingImage=null;
  document.getElementById('modalTitle').textContent=id?'Edit Stone':'Add New Stone';
  if(id){
    const g=gems.find(g=>g.id===id);
    if(!g)return;
    fillForm(g,g.slot||'');
  } else {
    document.getElementById('stoneName').value='';
    document.getElementById('dimL').value='';
    document.getElementById('dimW').value='';
    document.getElementById('dimD').value='';
    document.getElementById('stoneNotes').value='';
    document.getElementById('sourceUrl').value='';
    document.getElementById('sourceImgUrl').value='';
    document.getElementById('srcImgFeedback').innerHTML='';
    resetUpload();
    populateSlots(prefillSlot||'');
    if(prefillSlot){document.getElementById('slotSelect').value=prefillSlot;prefillSlot=null;}
  }
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');editingId=null;pendingImage=null;prefillSlot=null;}

function resetUpload(){
  document.getElementById('uploadZone').classList.remove('has-image');
  document.getElementById('uploadContent').innerHTML=`<div class="upload-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a8a060" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3.5"/><circle cx="17" cy="8" r="1"/></svg></div><div class="upload-hint">Click to upload photo</div>`;
  document.getElementById('imageInput').value='';
}
function showPreview(src){
  document.getElementById('uploadZone').classList.add('has-image');
  document.getElementById('uploadContent').innerHTML=`<img src="${src}" style="width:100%;max-height:200px;object-fit:cover;display:block;pointer-events:none;border-radius:16px">`;
}
function handleImageUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{pendingImage=e.target.result;showPreview(pendingImage);};
  reader.readAsDataURL(file);
}

function saveGem(){
  const name=document.getElementById('stoneName').value.trim();
  if(!name){
    const el=document.getElementById('stoneName');
    el.style.borderColor='#c46060';el.focus();
    setTimeout(()=>el.style.borderColor='',1500);return;
  }
  const gem={
    id:editingId||Date.now().toString(),
    name,
    length:document.getElementById('dimL').value||'',
    width:document.getElementById('dimW').value||'',
    depth:document.getElementById('dimD').value||'',
    notes:document.getElementById('stoneNotes').value.trim(),
    slot:document.getElementById('slotSelect').value||'',
    sourceUrl:document.getElementById('sourceUrl').value.trim(),
    sourceImgUrl:document.getElementById('sourceImgUrl').value.trim(),
    image:pendingImage||null,
    created:editingId?(gems.find(g=>g.id===editingId)?.created||Date.now()):Date.now()
  };
  if(editingId){const idx=gems.findIndex(g=>g.id===editingId);if(idx>-1)gems[idx]=gem;}
  else{gems.push(gem);}
  save();closeAddModal();closeDetailModal();render();renderCase();updateActionBar();
}

function openDetail(id){
  const g=gems.find(g=>g.id===id);
  if(!g)return;
  currentDetailId=id;
  const dims=[g.length,g.width,g.depth].filter(Boolean);
  const date=new Date(g.created).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  const imgEl=g.image?`<img class="detail-hero" src="${g.image}" alt="${g.name}">`:`<div class="detail-hero-ph">${getEmoji(g.name)}</div>`;
  let sourceHtml='';
  if(g.sourceUrl||g.sourceImgUrl){
    sourceHtml=`<div class="detail-source">
      <div class="detail-source-label">Source / Listing</div>
      ${g.sourceImgUrl?`<img class="detail-source-img" src="${g.sourceImgUrl}" alt="Reference" onerror="this.style.display='none'">` :''}
      ${g.sourceUrl?`<a class="detail-source-link" href="${g.sourceUrl}" target="_blank" rel="noopener">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        View Original Listing
      </a>`:''}
    </div>`;
  }
  document.getElementById('detailContent').innerHTML=`
    ${imgEl}
    <div class="detail-body">
      <div class="detail-name">${g.name}</div>
      ${g.slot?`<div class="detail-slot-tag">Slot ${g.slot}</div>`:''}
      <div class="detail-divider"></div>
      <div class="detail-stats">
        <div><div class="ds-label">Dimensions</div><div class="ds-value">${dims.length?dims.join(' × ')+' mm':'—'}</div></div>
        <div><div class="ds-label">Added</div><div class="ds-value" style="font-size:0.88rem">${date}</div></div>
        <div><div class="ds-label">ID</div><div class="ds-value" style="font-size:0.85rem;color:var(--muted)">#${g.id.slice(-4)}</div></div>
      </div>
      ${g.notes?`<div class="detail-notes">${g.notes}</div>`:''}
      ${sourceHtml}
    </div>`;
  document.getElementById('detailModal').classList.add('open');
}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('open');currentDetailId=null;}
function editCurrent(){const id=currentDetailId;closeDetailModal();openAddModal(id);}

function duplicateCurrent(){
  const g=gems.find(g=>g.id===currentDetailId);
  if(!g)return;
  closeDetailModal();
  editingId=null;pendingImage=null;
  document.getElementById('modalTitle').textContent='Duplicate — '+g.name;
  fillForm(g,'');
  document.getElementById('addModal').classList.add('open');
}

function deleteCurrent(){
  if(!confirm('Remove this stone from the vault?'))return;
  gems=gems.filter(g=>g.id!==currentDetailId);
  save();closeDetailModal();render();renderCase();updateActionBar();
}

function srcTab(id,btn){
  document.querySelectorAll('.src-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.src-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('srcPane'+id.charAt(0).toUpperCase()+id.slice(1)).classList.add('active');
}
function previewSrcImg(){
  const url=document.getElementById('sourceImgUrl').value.trim();if(!url)return;
  document.getElementById('srcImgFeedback').innerHTML=`<img class="src-preview" src="${url}" alt="Source preview" onerror="document.getElementById('srcImgFeedback').innerHTML='<div style=\\'color:#c46060;font-size:0.65rem;margin-top:0.4rem;font-weight:500\\'>Could not load image — check the URL</div>'">`;
}

function exportData(){
  if(!gems.length){alert('No stones to export yet!');return;}
  const blob=new Blob([JSON.stringify(gems,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='gem-vault-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}

function importData(){
  document.getElementById('importFile').value='';
  document.getElementById('importFile').click();
}

function handleImport(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const imported=JSON.parse(e.target.result);
      if(!Array.isArray(imported))throw new Error('Invalid format');
      const validKeys=['id','name','created'];
      const valid=imported.every(g=>validKeys.every(k=>k in g));
      if(!valid)throw new Error('Missing required fields');
      const existing=gems.map(g=>g.id);
      let added=0,skipped=0;
      imported.forEach(g=>{
        if(existing.includes(g.id)){skipped++;}
        else{gems.push(g);added++;}
      });
      save();render();renderCase();
      alert('Import complete!\n\n✅ '+added+' stones added\n⏭ '+skipped+' duplicates skipped (already in vault)');
    }catch(err){
      alert('Could not read file. Make sure it\'s a valid Gem Vault backup (.json).');
    }
  };
  reader.readAsText(file);
}

document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeAddModal();});
document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeDetailModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAddModal();closeDetailModal();}});

render();
</script>
